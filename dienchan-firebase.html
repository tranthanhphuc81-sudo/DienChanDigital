<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Diện Chẩn Firebase - Cloudinary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        .card { border: 1px solid #e2e8f0; border-radius: 1rem; background: white; }
        .card:hover { box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08); }
        .tag { font-size: 0.75rem; padding: 0.25rem 0.65rem; border-radius: 9999px; }
        .tag-primary { background: #e0f2fe; color: #0369a1; }
        .tag-secondary { background: #eef2ff; color: #4338ca; }
        .tab-button { border-radius: 9999px; padding: 0.85rem 1.2rem; min-width: 110px; }
        .tab-button.active { background: #1e293b; color: white; }
        .tab-button.inactive { background: #f8fafc; color: #475569; border: 1px solid #cbd5e1; }
        .accordion-card { border-radius: 1rem; overflow: hidden; border: 1px solid #e2e8f0; background: white; }
        .accordion-header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 1rem 1.25rem; cursor: pointer; background: #f8fafc; }
        .accordion-header h3 { margin: 0; font-size: 1.05rem; font-weight: 700; }
        .accordion-header small { color: #64748b; }
        .accordion-body { border-top: 1px solid #e2e8f0; padding: 1.25rem; }
        .accordion-body.hidden { display: none; }
        .detail-panel { border: 1px solid #e2e8f0; border-radius: 1rem; background: white; padding: 1.25rem; }
        .detail-panel h3 { font-size: 1.125rem; margin-bottom: 0.5rem; }
        .detail-row { display: grid; grid-template-columns: 110px 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
        .detail-row span:first-child { color: #475569; font-size: 0.82rem; font-weight: 600; }
        .huyet-result-card { border-radius: 1.5rem; overflow: hidden; border: 1px solid #e2e8f0; background: white; box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08); }
        .huyet-result-header { display: flex; justify-content: space-between; gap: 1rem; align-items: center; padding: 1rem 1.25rem; }
        .huyet-result-label { display: inline-flex; align-items: center; justify-content: center; min-width: 3.25rem; height: 3.25rem; border-radius: 9999px; background: #fee2e2; color: #b91c1c; font-weight: 700; font-size: 0.95rem; }
        .huyet-result-title { font-size: 1.15rem; font-weight: 700; margin: 0; }
        .huyet-result-actions { display: flex; gap: 0.75rem; }
        .huyet-action-btn { display: inline-flex; align-items: center; justify-content: center; width: 2.75rem; height: 2.75rem; border-radius: 9999px; border: 1px solid #e2e8f0; background: #fff; color: #475569; cursor: pointer; transition: all 0.2s ease; }
        .huyet-action-btn:hover { background: #f8fafc; transform: translateY(-1px); }
        .huyet-result-image { min-height: 220px; background: #f8fafc; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .huyet-result-image img, .image-zoomable { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }
        .huyet-result-body { padding: 1.25rem; }
        .image-lightbox { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(15, 23, 42, 0.85); z-index: 1000; padding: 2rem; }
        .image-lightbox.hidden { display: none; }
        .image-lightbox-img { max-width: 100%; max-height: 100%; border-radius: 1rem; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4); }
        .image-lightbox-close { position: fixed; top: 1.25rem; right: 1.25rem; width: 2.75rem; height: 2.75rem; border: none; border-radius: 9999px; background: rgba(15, 23, 42, 0.8); color: white; font-size: 1.5rem; line-height: 1; cursor: pointer; }
        .huyet-detail-row { display: grid; grid-template-columns: minmax(120px, auto) 1fr; gap: 0.75rem; margin-bottom: 1rem; }
        .huyet-detail-row span:first-child { font-weight: 700; color: #334155; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.9rem 0.75rem; border-bottom: 1px solid #e2e8f0; text-align: left; }
        th { background: #f8fafc; font-weight: 700; color: #334155; }
        tr:hover { background: #f8fafc; }
        #bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; padding-bottom: env(safe-area-inset-bottom, 0px); background: white; border-top: 1px solid #e2e8f0; }
        #bottom-nav .nav-btn { width: 20%; text-align: center; padding: 0.85rem 0; color: #64748b; }
        #bottom-nav .nav-btn.active { color: #dc2626; }
        @media (min-width: 768px) { #bottom-nav { display: none; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto space-y-6">
        <header class="bg-slate-800 text-white rounded-3xl p-6 shadow-xl">
            <h1 class="text-2xl sm:text-4xl font-bold">Diện Chẩn Firebase</h1>
            <p class="mt-2 text-slate-200">Trang mới dùng Firestore cho huyệt, phác đồ, bộ huyệt; ảnh vẫn lấy từ Cloudinary như cũ.</p>
        </header>

        <section class="space-y-4">
            <div class="flex flex-wrap gap-3 items-center">
                <button data-view="manage" onclick="showSection('manage')" class="tab-button active">⚙️ Quản lý</button>
                <button data-view="huyet" onclick="showSection('huyet')" class="tab-button inactive">🔍 Tra cứu Huyệt</button>
                <button data-view="protocols" onclick="showSection('protocols')" class="tab-button inactive">📋 Phác đồ Mẫu</button>
                <button data-view="groups" onclick="showSection('groups')" class="tab-button inactive">🧩 Bộ huyệt</button>
            </div>
            <div id="view-controls" class="card p-5 space-y-4">
                <div id="search-panel" class="space-y-4">
                    <div class="flex flex-wrap gap-3 items-center justify-between">
                        <button onclick="toggleFaceMap()" class="px-4 py-3 rounded-2xl bg-slate-900 text-white">🗺️ Sơ đồ huyệt tương tác</button>
                        <p class="text-sm text-slate-500">Tra cứu huyệt bằng dữ liệu Firebase hoặc dữ liệu cũ.</p>
                    </div>
                    <input id="search-input" type="search" placeholder="Nhập số huyệt (127, 19...) hoặc triệu chứng..." class="w-full p-4 border rounded-3xl text-slate-700" oninput="renderCurrentView()" />
                    <div class="flex flex-wrap gap-3">
                        <button onclick="clearSelection()" class="px-4 py-3 rounded-2xl bg-slate-100 text-slate-700">🧹 Xóa chọn</button>
                        <button onclick="loadAllFirebaseData()" class="px-4 py-3 rounded-2xl bg-amber-500 text-white">🔄 Tải lại dữ liệu</button>
                    </div>
                </div>
                <div id="face-map-panel" class="card p-5 hidden">
                    <h3 class="text-lg font-semibold mb-3">Sơ đồ huyệt tương tác</h3>
                    <p class="text-sm text-slate-500">Chức năng sơ đồ hiện tại chỉ để minh hoạ. Bạn có thể mở rộng bằng ảnh tương tác hoặc bản đồ huyệt.</p>
                </div>
            </div>
        </section>

        <section class="grid gap-6 lg:grid-cols-[1.8fr_1.2fr]">
            <div id="content-area" class="space-y-6"></div>
            <aside id="detail-panel" class="detail-panel hidden"></aside>
            <div id="image-lightbox" class="image-lightbox hidden" onclick="event.stopPropagation(); closeImageLightbox()">
                <img id="image-lightbox-img" class="image-lightbox-img" src="" alt="Ảnh phóng to" onclick="event.stopPropagation()" />
                <button class="image-lightbox-close" type="button" onclick="event.stopPropagation(); closeImageLightbox()">×</button>
            </div>
        </section>
        <div id="mobile-padding" class="h-24 md:hidden"></div>
        <nav id="bottom-nav" class="md:hidden">
            <div class="flex">
                <button onclick="showSection('manage')" class="nav-btn active">⚙️<div class="text-[11px]">Quản lý</div></button>
                <button onclick="showSection('huyet')" class="nav-btn">🔍<div class="text-[11px]">Huyệt</div></button>
                <button onclick="showSection('protocols')" class="nav-btn">📋<div class="text-[11px]">Phác đồ</div></button>
                <button onclick="showSection('groups')" class="nav-btn">🧩<div class="text-[11px]">Bộ huyệt</div></button>
            </div>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-firestore-compat.js"></script>
    <script src="cloudinary.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        let currentView = 'manage';
        let huyetItems = [];
        let protocolItems = [];
        let groupItems = [];
        let selectedItem = null;
        let selectedType = null;
        let editingType = null;
        let cloudinaryImportOpen = false;
        let cloudinaryImportIds = '';

        const protocolCategoryMenu = [
            { label: 'Đầu – Não', terms: ['đau đầu', 'chóng mặt', 'đầu', 'não'] },
            { label: 'Ổn định thần kinh', terms: ['thần kinh', 'stress', 'lo âu', 'mất ngủ'] },
            { label: 'Tim – Huyết áp', terms: ['tim', 'huyết áp', 'tăng huyết áp', 'hạ huyết áp'] },
            { label: 'Hô hấp', terms: ['hô hấp', 'ho', 'hen', 'viêm phổi'] },
            { label: 'Tiêu hóa', terms: ['tiêu hóa', 'dạ dày', 'đau bụng', 'chướng hơi'] },
            { label: 'Cơ xương', terms: ['cơ xương', 'đau lưng', 'gai cột sống', 'khớp'] },
            { label: 'Phụ – Nam khoa', terms: ['phụ khoa', 'nam khoa', 'kinh nguyệt', 'tiền liệt tuyến'] },
            { label: 'Ngũ quan', terms: ['mắt', 'tai', 'mũi', 'họng', 'miệng'] },
            { label: 'Trẻ em', terms: ['trẻ em', 'nhi', 'sốt', 'tiêu chảy'] },
            { label: 'Tiêu viêm – Bướu', terms: ['viêm', 'bướu', 'u bướu', 'viêm nhiễm'] },
            { label: 'Bạch huyết', terms: ['bạch huyết', 'miễn dịch', 'sưng hạch'] },
            { label: 'Giảm cân – Giảm béo', terms: ['giảm cân', 'giảm béo', 'mỡ', 'thừa cân'] },
            { label: 'Da liễu – Thẩm mỹ', terms: ['da liễu', 'thẩm mỹ', 'mụn', 'nám', 'tàn nhang'] },
            { label: 'Cấp cứu', terms: ['cấp cứu', 'đột quỵ', 'hôn mê', 'ngã'] },
            { label: 'Tổng quát', terms: ['tổng quát', 'toàn thân', 'bệnh chung'] }
        ];

        function showSection(name) {
            currentView = name;
            setActiveTab(name);
            clearSelection();
            renderCurrentView();
        }

        function getSearchText() {
            return document.getElementById('search-input').value.toLowerCase().trim();
        }

        const manageAccordionState = {
            login: true,
            data: false,
            control: false
        };

        function toggleManageAccordion(section) {
            manageAccordionState[section] = !manageAccordionState[section];
            renderCurrentView();
        }

        function renderManageView(container) {
            if (typeof DCFirebase !== 'undefined') {
                try { DCFirebase.initFirebase(); } catch (e) { /* ignore */ }
            }
            const authUser = (typeof DCFirebase !== 'undefined' && DCFirebase.getFirebaseUser()) ? DCFirebase.getFirebaseUser() : null;
            const authStatusText = authUser ? `Firebase đã đăng nhập: ${authUser.email}` : 'Chưa kết nối Firebase.';
            const authStatusClass = 'text-sm text-slate-500 mt-3';
            container.innerHTML = `
                <div class="space-y-4">
                    <div class="accordion-card">
                        <div class="accordion-header" onclick="toggleManageAccordion('login')">
                            <div>
                                <h3>Đăng nhập Firebase</h3>
                                <small>Đăng nhập, đăng ký hoặc đăng xuất tài khoản Firebase.</small>
                            </div>
                            <div>${manageAccordionState.login ? '&#x2212;' : '&#x2b;'}</div>
                        </div>
                        <div class="accordion-body ${manageAccordionState.login ? '' : 'hidden'}">
                            <input id="firebase-email" type="email" placeholder="Email Firebase" class="w-full p-3 border rounded-xl mb-3" />
                            <input id="firebase-password" type="password" placeholder="Mật khẩu Firebase" class="w-full p-3 border rounded-xl mb-3" />
                            <button onclick="onFirebaseSignIn()" class="w-full px-4 py-3 rounded-xl bg-blue-600 text-white mb-2">Đăng nhập</button>
                            <button onclick="onFirebaseSignUp()" class="w-full px-4 py-3 rounded-xl bg-emerald-600 text-white mb-2">Tạo tài khoản</button>
                            <button onclick="onFirebaseSignOut()" class="w-full px-4 py-3 rounded-xl bg-slate-300 text-slate-700">Đăng xuất</button>
                            <p id="firebase-auth-status" class="${authStatusClass}">${authStatusText}</p>
                            <p id="firebase-status" class="text-sm text-slate-500 mt-3"></p>
                        </div>
                    </div>
                    <div class="accordion-card">
                        <div class="accordion-header" onclick="toggleManageAccordion('data')">
                            <div>
                                <h3>Lấy dữ liệu</h3>
                                <small>Tải dữ liệu Firestore và chuyển dữ liệu cũ từ dienchan.html.</small>
                            </div>
                            <div>${manageAccordionState.data ? '&#x2212;' : '&#x2b;'}</div>
                        </div>
                        <div class="accordion-body ${manageAccordionState.data ? '' : 'hidden'}">
                            <button onclick="loadAllFirebaseData()" class="w-full px-4 py-3 rounded-xl bg-amber-500 text-white mb-3">Tải dữ liệu Firestore</button>
                            <button onclick="migrateEmbeddedData()" class="w-full px-4 py-3 rounded-xl bg-indigo-600 text-white">Migrate dữ liệu cũ</button>
                            <p class="text-sm text-slate-500 mt-4">Tải huyệt, phác đồ và bộ huyệt từ Firestore. Hoặc chuyển dữ liệu cũ từ <code>dienchan.html</code>.</p>
                            <p id="migrate-status" class="text-sm text-slate-500 mt-2"></p>
                        </div>
                    </div>
                    <div class="accordion-card">
                        <div class="accordion-header" onclick="toggleManageAccordion('control')">
                            <div>
                                <h3>Điều khiển</h3>
                                <small>Gọi nhanh bộ tách và tải từng loại dữ liệu riêng.</small>
                            </div>
                            <div>${manageAccordionState.control ? '&#x2212;' : '&#x2b;'}</div>
                        </div>
                        <div class="accordion-body ${manageAccordionState.control ? '' : 'hidden'}">
                            <button onclick="loadFirebaseCollection('acupoints')" class="w-full px-4 py-3 rounded-xl bg-slate-700 text-white mb-3">Tải Huyệt</button>
                            <button onclick="loadFirebaseCollection('treatmentPlans')" class="w-full px-4 py-3 rounded-xl bg-slate-700 text-white mb-3">Tải Phác đồ</button>
                            <button onclick="loadFirebaseCollection('acupointGroups')" class="w-full px-4 py-3 rounded-xl bg-slate-700 text-white mb-3">Tải Bộ huyệt</button>
                            <button onclick="toggleCloudinaryImport()" class="w-full px-4 py-3 rounded-xl bg-indigo-600 text-white mt-3">Import Cloudinary IDs</button>
                            ${cloudinaryImportOpen ? `
                                <div class="mt-4 p-4 bg-slate-50 rounded-3xl border border-slate-200">
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">Dán danh sách ID ảnh Cloudinary (số hiệu huyệt)</label>
                                    <textarea id="cloudinary-ids-input" class="w-full h-32 p-3 border rounded-2xl text-slate-700" placeholder="Ví dụ: 1 2 3 10 11" oninput="cloudinaryImportIds = this.value">${cloudinaryImportIds || ''}</textarea>
                                    <div class="flex flex-wrap gap-3 mt-3">
                                        <button type="button" onclick="submitCloudinaryIds()" class="px-4 py-3 rounded-2xl bg-slate-900 text-white">Tạo huyệt từ IDs</button>
                                        <button type="button" onclick="toggleCloudinaryImport()" class="px-4 py-3 rounded-2xl bg-slate-100 text-slate-700">Đóng</button>
                                    </div>
                                </div>
                            ` : ''}
                            <p class="text-sm text-slate-500 mt-4">Dữ liệu vẫn dùng Cloudinary cho ảnh và Firestore cho nội dung.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCurrentView() {
            const search = getSearchText();
            const container = document.getElementById('content-area');
            if (!container) return;
            const controls = document.getElementById('view-controls');
            if (controls) {
                controls.style.display = currentView === 'manage' ? 'none' : 'block';
            }
            if (currentView === 'manage') {
                return renderManageView(container);
            }
            if (currentView === 'huyet') return renderHuyetList(container, search);
            if (currentView === 'protocols') return renderProtocolList(container, search);
            if (currentView === 'groups') return renderGroupList(container, search);
        }

        function setActiveTab(name) {
            document.querySelectorAll('.tab-button').forEach(btn => {
                const isActive = btn.dataset.view === name;
                btn.classList.toggle('active', isActive);
                btn.classList.toggle('inactive', !isActive);
            });
            document.querySelectorAll('#bottom-nav .nav-btn').forEach(btn => {
                const view = btn.getAttribute('onclick')?.match(/showSection\('([^']+)'\)/)?.[1];
                btn.classList.toggle('active', view === name);
            });
            const facePanel = document.getElementById('face-map-panel');
            if (name !== 'huyet' && facePanel) facePanel.classList.add('hidden');
        }

        function clearSelection() {
            const detail = document.getElementById('detail-panel');
            if (detail) detail.classList.add('hidden');
            selectedItem = null;
            selectedType = null;
            editingType = null;
        }

        function toggleFaceMap() {
            const panel = document.getElementById('face-map-panel');
            if (!panel) return;
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) {
                panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function getHuyetTitle(item) {
            const id = String(item.id || '').trim();
            const name = String(item.name || '').trim();
            if (!name || name === id) {
                return `#${id}`;
            }
            return `#${id} ${name}`;
        }

        function renderDetail(item, type) {
            const detail = document.getElementById('detail-panel');
            if (!detail) return;
            if (!item) {
                detail.classList.add('hidden');
                return;
            }
            detail.classList.remove('hidden');
            const title = type === 'huyet' ? getHuyetTitle(item) : item.title || item.name || '';
            const subtitle = type === 'huyet' ? item.location || '' : (item.acupointIds || []).join(', ');
            detail.innerHTML = `
                <div class="flex items-start justify-between gap-3 mb-4">
                    <div>
                        <h3>${title}</h3>
                        <p class="text-sm text-slate-500">${subtitle}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="clearSelection()" class="px-3 py-2 rounded-xl bg-slate-100 text-slate-700">Đóng</button>
                        <button type="button" onclick="startEdit('${type}', '${item.id || item.title || item.name}')" class="px-3 py-2 rounded-xl bg-slate-900 text-white">Chỉnh sửa</button>
                    </div>
                </div>
                <div class="space-y-3">
                    ${type === 'huyet' ? editingType === 'huyet' ? `
                        <div class="space-y-4">
                            <div>
                                <label class="text-sm font-semibold text-slate-700">Tên huyệt</label>
                                <input id="edit-name" class="w-full p-3 border rounded-xl" value="${item.name || ''}" />
                            </div>
                            <div>
                                <label class="text-sm font-semibold text-slate-700">Vị trí</label>
                                <textarea id="edit-location" class="w-full p-3 border rounded-xl" rows="2">${item.location || ''}</textarea>
                            </div>
                            <div>
                                <label class="text-sm font-semibold text-slate-700">Tác dụng</label>
                                <textarea id="edit-functions" class="w-full p-3 border rounded-xl" rows="3">${item.functions || ''}</textarea>
                            </div>
                            <div>
                                <label class="text-sm font-semibold text-slate-700">Thực hiện</label>
                                <textarea id="edit-manual" class="w-full p-3 border rounded-xl" rows="3">${item.manual || ''}</textarea>
                            </div>
                            <div class="flex flex-wrap gap-3">
                                <button onclick="saveHuyetEdits()" class="px-4 py-3 rounded-xl bg-emerald-600 text-white">Lưu thay đổi</button>
                                <button onclick="cancelEdit()" class="px-4 py-3 rounded-xl bg-slate-100 text-slate-700">Hủy</button>
                            </div>
                        </div>
                    ` : `
                        <div class="detail-row"><span>Vị trí</span><span>${item.location || 'Không có'}</span></div>
                        <div class="detail-row"><span>Tác dụng</span><span>${item.functions || 'Không có'}</span></div>
                        <div class="detail-row"><span>Thực hiện</span><span>${item.manual || 'Không có'}</span></div>
                    ` : type === 'protocols' ? editingType === 'protocols' ? `
                        <div class="space-y-4">
                            <div>
                                <label class="text-sm font-semibold text-slate-700">Tiêu đề</label>
                                <input id="edit-title" class="w-full p-3 border rounded-xl" value="${item.title || ''}" />
                            </div>
                            <div>
                                <label class="text-sm font-semibold text-slate-700">Mô tả</label>
                                <textarea id="edit-description" class="w-full p-3 border rounded-xl" rows="3">${item.description || item.note || ''}</textarea>
                            </div>
                            <div>
                                <label class="text-sm font-semibold text-slate-700">Huyệt</label>
                                <input id="edit-acupointIds" class="w-full p-3 border rounded-xl" value="${(item.acupointIds || []).join(' ')}" />
                            </div>
                            <div>
                                <label class="text-sm font-semibold text-slate-700">Keywords</label>
                                <input id="edit-keywords" class="w-full p-3 border rounded-xl" value="${(item.keywords || []).join(' ')}" />
                            </div>
                            <div class="flex flex-wrap gap-3">
                                <button onclick="saveProtocolEdits()" class="px-4 py-3 rounded-xl bg-emerald-600 text-white">Lưu thay đổi</button>

        function selectHuyetImageFile(id) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async () => {
                const file = input.files && input.files[0];
                if (!file) return;
                await uploadHuyetImage(id, file);
            };
            input.click();
        }

        async function uploadHuyetImage(id, file) {
            const item = huyetItems.find(i => String(i.id) === String(id));
            if (!item) return setStatus('Không tìm thấy huyệt để chèn ảnh.', true);
            if (typeof DCcloudinary === 'undefined') return setStatus('Cloudinary chưa được cấu hình.', true);
            try {
                setStatus('Đang upload ảnh huyệt lên Cloudinary...');
                const result = await DCcloudinary.uploadFile(file, { folder: 'dienchan/huyet' });
                const publicId = result.public_id || result.asset_id || result.public_id;
                if (!publicId) throw new Error('Không lấy được public_id từ Cloudinary.');
                const existing = Array.isArray(item.imageIds) ? [...item.imageIds] : (item.imageIds ? [item.imageIds] : []);
                if (!existing.includes(publicId)) {
                    existing.unshift(publicId);
                }
                item.imageIds = existing;
                if (typeof DCcloudinary.saveMetadata === 'function') {
                    DCcloudinary.saveMetadata(publicId, result);
                }
                if (typeof DCFirebase !== 'undefined' && DCFirebase.getFirebaseUser()) {
                    await DCFirebase.saveAcupoint({
                        id: item.id,
                        name: item.name || item.id,
                        location: item.location,
                        functions: item.functions,
                        manual: item.manual,
                        imageIds: item.imageIds,
                        tags: item.tags || [],
                        createdBy: DCFirebase.getFirebaseUser().uid
                    });
                    setStatus('Đã lưu ảnh huyệt và cập nhật vào Firebase.');
                } else {
                    setStatus('Ảnh đã upload. Đăng nhập Firebase để lưu thay đổi.');
                }
                if (selectedItem && String(selectedItem.id) === String(id)) {
                    selectedItem = item;
                    renderDetail(item, 'huyet');
                }
                renderCurrentView();
            } catch (err) {
                setStatus(`Upload ảnh thất bại: ${err.message || err}`, true);
            }
        }

                return;

            DCFirebase.initFirebase();
            if (!DCFirebase.getFirebaseUser()) {

                return;
            }
            const statusText = `Đang tạo ${ids.length} huyệt từ ảnh Cloudinary...`;

            try {

                setStatus(`Hoàn thành: tạo ${result.created}, bỏ qua ${result.skipped}${result.errors.length ? `, lỗi ${result.errors.length}` : ''}.`);

        function suggestProtocolsFromSearch() {
            const search = getSearchText();
            if (!search) {

                return;

            renderCurrentView();

        function getHuyetSearchResults(search) {
            const normalized = search.trim().toLowerCase();
            if (!normalized) return [];
            const tokens = normalized.split(/[\s,;|]+/).filter(Boolean);
            const ids = tokens.filter(t => /^\d+$/.test(t));
            if (ids.length) {
                const seen = new Set();
                const results = [];
                for (const id of ids) {
                    if (seen.has(id)) continue;
                    const item = huyetItems.find(i => String(i.id) === id);
                    if (item) {
                        seen.add(id);
                        results.push(item);
                    }
                }
                if (results.length) return results;
            }
            return huyetItems.filter(item => {
                const hay = `${item.id} ${item.name || ''} ${item.location || ''} ${item.functions || ''}`.toLowerCase();
                return hay.includes(normalized);
            });
        }

                await DCFirebase.signOutFirebase();
                setStatus('Đã đăng xuất.');
            } catch (err) {
                setStatus(`Lỗi đăng xuất: ${err.message || err}`, true);
            }
        }

        async function loadFirebaseCollection(collection, navigate = true) {
            try {
                DCFirebase.initFirebase();
                const docs = await DCFirebase.listDocuments(collection);
                if (collection === 'acupoints') {
                    huyetItems = docs;
                    if (navigate) showSection('huyet');
                } else if (collection === 'treatmentPlans') {
                    protocolItems = docs;
                    if (navigate) showSection('protocols');
                } else if (collection === 'acupointGroups') {
                    groupItems = docs;
                    if (navigate) showSection('groups');
                }
                setStatus(`Đã tải ${docs.length} bản ghi từ ${collection}.`);
            } catch (err) {
                setStatus(`Lỗi tải ${collection}: ${err.message || err}`, true);
            }
        }

        async function loadAllFirebaseData() {
            const previousView = currentView;
            await loadFirebaseCollection('acupoints', false);
            await loadFirebaseCollection('treatmentPlans', false);
            await loadFirebaseCollection('acupointGroups', false);
            if (!huyetItems.length && !protocolItems.length && !groupItems.length) {
                await loadFallbackEmbeddedData();
            }
            showSection(previousView);
        }

        function parseJsArray(html, name) {
            const regex = new RegExp(`const\\s+${name}\\s*=\\s*(\\[[\\s\\S]*?\\]);`);
            const match = html.match(regex);
            if (!match) throw new Error(`Không tìm thấy ${name} trong dienchan.html`);
            return new Function('return ' + match[1])();
        }

        async function loadFallbackEmbeddedData() {
            const statusEl = document.getElementById('migrate-status');
            if (statusEl) statusEl.textContent = 'Firestore trống, đang dùng dữ liệu cũ để hiển thị tạm thời...';
            const html = await fetch('dienchan.html').then(r => r.text());
            const database = parseJsArray(html, 'database');
            const protocols = parseJsArray(html, 'protocols');
            const setImages = parseJsArray(html, 'setImages');
            huyetItems = database.map(item => ({
                id: item.id,
                name: item.name || item.id,
                location: item.pos || '',
                functions: item.effect || '',
                manual: item.manual || ''
            }));
            protocolItems = protocols.map(item => ({
                id: item.id || item.name || item.title,
                title: item.name || item.title || 'Phác đồ',
                description: item.note || item.description || '',
                acupointIds: Array.isArray(item.points) ? item.points.map(String) : []
            }));
            groupItems = setImages.map(item => ({
                id: item.imageKey || item.file?.replace(/\.[^.]+$/, '') || item.title,
                title: item.title || item.name || 'Bộ huyệt',
                description: item.description || '',
                acupointIds: item.points || item.acupointIds || [],
                imageIds: item.file ? [item.file.replace(/\.[^.]+$/, '')] : (item.imageKey ? [item.imageKey] : [])
            }));
            setStatus('Đã hiển thị dữ liệu cũ tạm thời. Hãy migrate nếu muốn lưu vào Firestore.');
            renderCurrentView();
        }

        async function migrateEmbeddedData() {
            const statusEl = document.getElementById('migrate-status');
            if (statusEl) statusEl.textContent = 'Đang đọc dữ liệu cũ từ dienchan.html...';
            try {
                DCFirebase.initFirebase();
                const user = DCFirebase.getFirebaseUser();
                if (!user) throw new Error('Vui lòng đăng nhập Firebase trước khi migrate.');
                const html = await fetch('dienchan.html').then(r => r.text());
                const database = parseJsArray(html, 'database');
                const protocols = parseJsArray(html, 'protocols');
                const setImages = parseJsArray(html, 'setImages');

                let count = { huyet: 0, protocol: 0, group: 0 };
                for (const item of database) {
                    await DCFirebase.saveAcupoint({
                        id: item.id,
                        name: item.name || item.id,
                        location: item.pos || '',
                        functions: item.effect || '',
                        manual: item.manual || '',
                        imageIds: item.id ? [item.id] : [],
                        tags: ['embedded', 'legacy'],
                        createdBy: user.uid,
                        meta: { legacySource: 'dienchan.html' }
                    });
                    count.huyet += 1;
                }
                for (const item of protocols) {
                    await DCFirebase.saveTreatmentPlan({
                        title: item.name || item.title || 'Phác đồ cũ',
                        description: item.note || item.description || '',
                        acupointIds: Array.isArray(item.points) ? item.points.map(String) : [],
                        keywords: item.keywords || [],
                        imageIds: item.imageIds || [],
                        createdBy: user.uid,
                        meta: { legacySource: 'dienchan.html' }
                    });
                    count.protocol += 1;
                }
                for (const item of setImages) {
                    const imageKey = item.file ? item.file.replace(/\.[^.]+$/, '') : item.imageKey || '';
                    await DCFirebase.saveAcupointGroup({
                        title: item.title || item.name || 'Bộ huyệt cũ',
                        description: item.description || '',
                        acupointIds: item.points || item.acupointIds || [],
                        imageIds: imageKey ? [imageKey] : [],
                        tags: ['embedded', 'legacy'],
                        notes: item.note || '',
                        createdBy: user.uid,
                        meta: { legacySource: 'dienchan.html' }
                    });
                    count.group += 1;
                }

                const legacyResult = await DCFirebase.migrateLegacyDataToFirebase();
                const legacyTotal = legacyResult.acupoints + legacyResult.protocols + legacyResult.groups + legacyResult.records;
                if (statusEl) statusEl.textContent = `Hoàn tất: ${count.huyet} huyệt, ${count.protocol} phác đồ, ${count.group} bộ huyệt. Đã migrate thêm ${legacyTotal} bản ghi cũ.`;
                setStatus('Migration đã hoàn thành.');
                await loadAllFirebaseData();
            } catch (err) {
                if (statusEl) statusEl.textContent = `Lỗi: ${err.message || err}`;
                setStatus(`Migration thất bại: ${err.message || err}`, true);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            try { DCFirebase.initFirebase(); } catch (e) { console.warn('Không thể khởi tạo Firebase ngay.', e); }
            showSection('manage');
        });
    </script>
</body>
</html>
